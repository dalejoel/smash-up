<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Up Card Selector</title>
    <meta name="description" content="A modernized utility for drafting and distributing Smash Up expansion decks to players.">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="images/logo_s.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1b4b">
    
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <!-- Premium Header -->
    <header>
      <div class="logo-container">
        <div class="logo-icon">⚔️</div>
        <h1>Smash Up Deck Selector</h1>
      </div>
    </header>

    <!-- Main Container -->
    <main class="container">
      
      <!-- Control Panel (Left Sidebar on desktop) -->
      <section class="control-panel">
        <div>
          <h2 class="section-title">Draft Settings</h2>
          <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">
            Select player count and trigger random deck selection.
          </p>
        </div>

        <div class="select-wrapper">
          <select id="player-select">
            <option value="" disabled selected>Select Players...</option>
            <option value="2">2 Players (Needs 4 Decks)</option>
            <option value="3">3 Players (Needs 6 Decks)</option>
            <option value="4">4 Players (Needs 8 Decks)</option>
            <option value="5">5 Players (Needs 10 Decks)</option>
          </select>
        </div>

        <div class="select-wrapper">
          <select id="profile-select">
            <option value="joel-dale">Profile: Joel Dale</option>
            <option value="all-decks">Profile: All Decks</option>
            <option value="custom">Profile: Custom Selection</option>
          </select>
        </div>

        <div style="display: flex; align-items: center; gap: 0.65rem; margin: 0.25rem 0 0.5rem 0; cursor: pointer; user-select: none;">
          <input type="checkbox" id="balance-check" checked>
          <label for="balance-check" style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary); cursor: pointer;">Avoid Bad Pairings (Balanced)</label>
        </div>
        <div style="display: flex; align-items: center; gap: 0.65rem; margin: 0.25rem 0 0.5rem 0; cursor: pointer; user-select: none;">
          <input type="checkbox" id="titan-filter-check">
          <label for="titan-filter-check" style="font-size: 0.9rem; font-weight: 600; color: var(--text-primary); cursor: pointer;">Show Only Decks with Titans</label>
        </div>
        <p style="font-size: 0.75rem; color: var(--text-secondary); line-height: 1.45; margin-bottom: 1.25rem; margin-top: -0.25rem;">
          Filters the checklist to display only the expansions and factions that have associated Titan cards.
        </p>

        <button class="btn-primary" id="pick-btn">
          <span>⚡</span> Pick Decks
        </button>

        <div id="error-container"></div>
      </section>

      <!-- Right Content Area -->
      <div class="main-content">
        <!-- Decks Checklist Panel (Main content area) -->
        <section class="decks-panel">
          <div class="decks-header">
            <h2 class="section-title">Active Expansions & Decks</h2>
            <div class="decks-count">
              <span id="active-count">0</span> Active Decks
            </div>
          </div>

          <div id="expansions-container" class="expansions-grid">
            <!-- Dynamically populated expansions list -->
          </div>
        </section>

        <!-- Players Assignments Results (Below checklist on the right) -->
        <section id="players-section" class="players-section" hidden>
          <h2 class="section-title">Distributed Player Decks</h2>
          <div id="results-container" class="players-grid">
            <!-- Dynamically populated cards -->
          </div>
        </section>
      </div>

    </main>

    <!-- Modern ESM Logic -->
    <script type="module" src="src/main.js"></script>
  </body>
</html>
